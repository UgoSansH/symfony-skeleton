[PHP]
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
;error_log = /dev/stderr

memory_limit = 256M
max_execution_time = 180
upload_max_filesize = 100M
post_max_size = 100M

date.timezone = UTC

[opcache]
opcache.enable = 0
; Activer OPcache pour le CLI (utile en dev, désactiver en prod)
opcache.enable_cli = 0

; Mémoire allouée en Mo
opcache.memory_consumption = 256
opcache.max_accelerated_files = 20000

; Vérifier les modifications des fichiers toutes les N secondes
; 0 = désactivé (recommandé en production)
; 2 = vérifier toutes les 2 secondes (utile en développement)
opcache.revalidate_freq = 2
opcache.save_comments = 0

; Optimiser le cache
opcache.fast_shutdown = 1
; Désactiver en production (0)
opcache.validate_timestamps = 1

[session]
session.save_handler = files
session.save_path = "/tmp/sessions"
session.gc_maxlifetime = 86400
